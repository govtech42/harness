name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    name: create GitHub release
    needs: ci
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          changelog=".claude/CHANGELOG.md"
          if [[ ! -f "$changelog" ]]; then
            echo "no CHANGELOG.md — using generic notes"
            echo "body=Tag ${tag}." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Strip the leading 'v' for matching tag against the file content.
          version_re="${tag#v}"

          # Try to extract the section whose H2 contains the tag or version.
          # CHANGELOG entries look like:  ## YYYY-MM-DD — title
          # We additionally match if an entry's body mentions the tag.
          # Default fallback: include the most recent entry.
          awk -v want="$version_re" '
            BEGIN { capture=0; found=0; buf="" }
            /^## / {
              if (capture) { exit }
              if ($0 ~ want) { capture=1; found=1; print; next }
              if (!found && first==0) { first_section=NR; first=1; first_buf=$0 "\n"; capture_first=1; next }
              if (capture_first) { capture_first=0 }
              next
            }
            { if (capture) print; else if (capture_first) first_buf = first_buf $0 "\n" }
            END { if (!found) printf "%s", first_buf }
          ' "$changelog" > release_notes.md

          if [[ ! -s release_notes.md ]]; then
            echo "Tag ${tag}." > release_notes.md
          fi

          {
            echo 'body<<__EOF__'
            cat release_notes.md
            echo
            echo '🤖 Generated by [release.yml](.github/workflows/release.yml)'
            echo '__EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Create release (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "release $tag already exists — refreshing notes"
            gh release edit "$tag" --notes-file release_notes.md
          else
            gh release create "$tag" \
              --title "$tag" \
              --notes-file release_notes.md
          fi
