name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call: {}

permissions:
  contents: read

jobs:
  lint:
    name: shellcheck + bash -n
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run lint
        run: bash tests/lint.sh

  env-completeness:
    name: .env.example completeness
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - run: bash tests/check_env_completeness.sh

  bats:
    name: bats unit + launcher tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats
      - name: Run bats
        run: bats tests/
